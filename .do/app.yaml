# DigitalOcean App Platform — static site spec
# Deploy: commit this repo to GitHub, then in the DO control panel choose
# "Create App" → pick this repo → DO reads .do/app.yaml automatically.
# Or with the CLI:  doctl apps create --spec .do/app.yaml
name: in-base
region: nyc

static_sites:
  - name: site
    github:
      repo: sylgeist/inbase
      branch: main
      deploy_on_push: true

    # Pin Hugo so the build is reproducible. DO's default image may carry a
    # different version; HUGO_VERSION forces the one we built against.
    # The extended edition is needed for the CSS pipeline (minify/fingerprint).
    environment_slug: hugo
    envs:
      - key: HUGO_VERSION
        value: "0.163.3"
        scope: BUILD_TIME
      - key: HUGO_ENV
        value: "production"
        scope: BUILD_TIME

    build_command: hugo --gc --minify
    output_dir: public

    # Friendly 404 instead of the default.
    catchall_document: 404.html

    domains:
      - domain: inbase.bsdblog.com
        type: PRIMARY
